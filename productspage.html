<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <title>home</title>
</head>
<body>

    <div class="top-navbar">
        <div class="logo">
            <a href="7AJZAPP.html">7AJZ</a>
        </div>
        <div class="nav-icons">
            <a href="notification.html"><img src="notification.png" alt="notification" class="notification"></a>
            <a href="profilepage.html"><img src="user.png" alt="Profile" height="30px" width="30px"></a>
        </div>
    </div>

    <div class="searchbox">
        <input type="text" placeholder="Search for products...">
        <button type="submit">Search</button>
    </div>

    <div class="cube-products">
        <div class="bord-elemnt-product1">
            <h3><img src="" alt="">product 1</h3>
        </div>
        <div class="bord-elemnt-product2">
            <h3><img src="" alt="">product 2</h3>
        </div>
        <div class="bord-elemnt-product3">
            <h3><img src="" alt="">product 3</h3>
        </div>
        <div class="bord-elemnt-product4">
            <h3><img src="" alt="">product 4</h3>
        </div>
        <div class="bord-elemnt-product5">
            <h3><img src="" alt="">product 5</h3>
        </div>
        <div class="bord-elemnt-product6">
            <h3><img src="" alt="">product 6</h3>
        </div>
    </div>

    <div class="list-home">
        <ul>
            <li><a href="signin.html"><img src="user.png" height="40px" width="40px"></a></li>
            <li><a href="productspage.html"><img src="football.png" height="40px" width="40px"></a></li>
            <li><a href="page7ajz.html"><img src="football-field.png" height="40px" width="40px"></a></li>
            <li><a href="homeapp.html"><img src="home.png" height="40px" width="40px"></a></li>
        </ul>
    </div>

    

    <style>
        body{
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("grass-stadium.jpg");
            background-size: cover;
            font-family: Arial;
            background-position: center;
            background-attachment: fixed;
        }
        .list-home{
            height: 25px;
            width: 95%;
            position: fixed;
            bottom: 6px;
            display: flex;
            justify-content: space-around ;
            padding: 20px ;
        }
        .list-home ul{
            display: flex;
            justify-content: space-around;
            width: 90%;
            padding: 0;
            margin-top: -4px;
            list-style: none;
        }
         li:hover{
            background-color: #a1a1a1 ;
            border-radius: 10px;
            height: 40px;
            width: 40px;
            cursor: pointer;
            padding: 5px;
        }
        @media only screen and (max-width: 400px) {
            .list-home{
                width: 100%;
                flex-direction: column;
                text-align: center;
            }
        }
        .top-navbar {
            position: fixed;
            top: 0;
            left: -10px;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
            border-radius: 10px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            padding: 15px;
            cursor: pointer;
        }
        .nav-icons {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            padding: 20px;
        }
        .notification {
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
        .nav-icons :hover {
            background-color: #a1a1a1;
            border-radius: 10px;
            padding: 5px;
        }
        @media only screen and (max-width: 600px) {
            .top-navbar {
                padding: 5px 10px;
            }
            .logo {
                font-size: 15px;
                gap: 5px;
            }
            .logo img {
                height: 25px;
                width: 25px;
            }
            .nav-icons img {
                height: 25px;
                width: 25px;
            }
            .notification {
                width: 25px;
                height: 25px;
            }
        }
        .cube-products{
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 100px;
        }
        .bord-elemnt-product1, .bord-elemnt-product2, .bord-elemnt-product3, .bord-elemnt-product4, .bord-elemnt-product5, .bord-elemnt-product6 {
            background-color: white;
            border: 3px solid black;
            height: 160px;
            width: 150px;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 2px 2px 10px rgba(0, 30, 255, 0.2);
            cursor: pointer;
        }
            .bord-elemnt-product1:hover, .bord-elemnt-product2:hover, .bord-elemnt-product3:hover, .bord-elemnt-product4:hover, .bord-elemnt-product5:hover, .bord-elemnt-product6:hover {
                background-color: #a1a1a1;
                box-shadow: 2px 2px 10px rgba(0, 30, 255, 0.2);
            }


        @media only screen and (max-width: 600px) {
            .bord-elemnt-product1, .bord-elemnt-product2, .bord-elemnt-product3, .bord-elemnt-product4, .bord-elemnt-product5, .bord-elemnt-product6 {
                width: 100%;
                max-width: 300px;
            }
        }
            .searchbox {
                display: flex;
                justify-content: center;
                margin-top: 100px;
            }
            .searchbox input {
                width: 260px;
                padding: 10px;
                border: 2px solid black;
                border-radius: 10px 0 0 10px;
                outline: none;
            }
            .searchbox button {
                padding: 10px 20px;
                background-color: #007bff;
                color: white;
                border: none;
                border-radius: 0 10px 10px 0;
                cursor: pointer;
            }
            .searchbox button:hover {
                background-color: #0056b3;
                box-shadow: 2px 2px 10px rgba(0, 30, 255, 0.2);
            }

    </style>
</body>
</html>
