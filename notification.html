<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <title>notifications</title>
</head>
<body>

    <div class="top-navbar">
        <div class="logo">
            <a href="7AJZAPP.html">7AJZ</a>
        </div>
        <div class="nav-icons">
            <img src="notification.png" alt="notification" class="notification">
            <a href="profilepage.html"><img src="user.png" alt="Profile" height="30px" width="30px"></a>
        </div>
    </div>

    <div class="bord-notifaction">
        <div class="bord-elemnt-product">
            <h3 style="padding: 10px;">Your order has been shipped!</h3>
        </div>
        <div class="bord-elemnt-product" style="margin-top: 10px;">
            <h3 style="padding: 10px;">New product added to your wishlist!</h3>
        </div>
        <div class="bord-elemnt-product" style="margin-top: 10px;">
            <h3 style="padding: 10px;">Your password was changed successfully.</h3>
        </div>
    </div>

    
    <div class="list-home">
        <ul>
            <li><a href="signin.html"><img src="user.png" height="40px" width="40px"></a></li>
            <li><a href="productspage.html"><img src="football.png" height="40px" width="40px"></a></li>
            <li><a href="page7ajz.html"><img src="football-field.png" height="40px" width="40px"></a></li>
            <li><a href="homeapp.html"><img src="home.png" height="40px" width="40px"></a></li>
        </ul>
    </div>

    

    <style>
        body{
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: Arial;
        }
        .list-home{
            height: 25px;
            width: 95%;
            position: fixed;
            bottom: 6px;
            display: flex;
            justify-content: space-around ;
            padding: 20px ;
        }
        .list-home ul{
            display: flex;
            justify-content: space-around;
            width: 90%;
            padding: 0;
            margin-top: -4px;
            list-style: none;
        }
         li:hover{
            background-color: #a1a1a1 ;
            border-radius: 10px;
            height: 40px;
            width: 40px;
            cursor: pointer;
            padding: 5px;
        }
        @media only screen and (max-width: 400px) {
            .list-home{
                width: 100%;
                flex-direction: column;
                text-align: center;
            }
        }
        .swiper {
            width: 100%;
            height: 210px;
            margin-bottom: 20px;
            border-radius: 30px;
            margin-top: 90px;
        }
        .swiper-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;

        }
        .top-navbar {
            position: fixed;
            top: 0;
            left: -10px;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
            border-radius: 10px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            padding: 15px;
            cursor: pointer;
        }
        .nav-icons {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            padding: 20px;
        }
        .notification {
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
        .nav-icons :hover {
            background-color: #a1a1a1;
            border-radius: 10px;
            padding: 5px;
        }
        @media only screen and (max-width: 600px) {
            .top-navbar {
                padding: 5px 10px;
            }
            .logo {
                font-size: 15px;
                gap: 5px;
            }
            .logo img {
                height: 25px;
                width: 25px;
            }
            .nav-icons img {
                height: 25px;
                width: 25px;
            }
            .notification {
                width: 25px;
                height: 25px;
            }
        }
            .bord-elemnt-product{
                background-color: white;
                width: 100%;
                height: 87px;
                box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
                border-radius: 10px;
            }

            .bord-notifaction{
                width: 90%;
                margin: auto;
                margin-top: 210px;
            }
           
           
          
    </style>
      
    <script>
        const swiper = new Swiper('.swiper', {
            autoplay: {
                delay: 2000,
                disableOnInteraction: false,
            },
            loop: true,
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
        });
    </script>
</body>
</html>
